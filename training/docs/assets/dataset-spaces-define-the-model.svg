<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 990" font-family="Segoe UI, Arial, sans-serif">
  <title>Causal GPT-RL — Your Dataset Spaces Define the Model</title>
  <desc>Autoregressive I/O convention and build-time I/O schema construction: Minari offline dataset spaces define the DataSpec schema, which defines the model's input and output heads.</desc>
  <rect width="1460" height="990" fill="#ffffff"/>

  <defs>
    <!-- Action space feeds BOTH input (purple) and output (orange) -->
    <linearGradient id="spaceActionStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4a7e7"/>
      <stop offset="1" stop-color="#f6c68a"/>
    </linearGradient>
    <linearGradient id="spaceActionFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2ebfa"/>
      <stop offset="1" stop-color="#fdf1e0"/>
    </linearGradient>
  </defs>

  <!-- ================= TITLE ================= -->
  <text x="730" y="54" text-anchor="middle" font-size="48" font-weight="700" fill="#404040">Causal GPT-RL: <tspan font-weight="600" fill="#d1544a">Your Dataset Spaces Define the Model</tspan></text>

  <g transform="translate(0,100)">
  <!-- ================= INPUT CONTEXT (left) ================= -->
  <text x="315" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#8f6fbf">Input context</text>
  <text x="315" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#404040">autoregressive token sequence → x₁ … xₜ</text>

  <!-- dark rounded context bar holding the token sequence -->
  <rect x="80" y="116" width="470" height="74" rx="37" fill="#404040"/>
  <circle cx="130" cy="153" r="24" fill="#c4a7e7"/>
  <text x="130" y="159" text-anchor="middle" font-size="15" fill="#2b2b2b">x<tspan dy="5" font-size="10">1</tspan></text>
  <circle cx="200" cy="153" r="24" fill="#c4a7e7"/>
  <text x="200" y="159" text-anchor="middle" font-size="15" fill="#2b2b2b">x<tspan dy="5" font-size="10">2</tspan></text>
  <circle cx="270" cy="153" r="24" fill="#c4a7e7"/>
  <text x="270" y="159" text-anchor="middle" font-size="15" fill="#2b2b2b">x<tspan dy="5" font-size="10">3</tspan></text>
  <text x="340" y="162" text-anchor="middle" font-size="26" font-weight="700" fill="#c4a7e7">···</text>
  <circle cx="410" cy="153" r="24" fill="#c4a7e7"/>
  <text x="410" y="158" text-anchor="middle" font-size="14" fill="#2b2b2b">x<tspan dy="5" font-size="9">t-1</tspan></text>
  <!-- latest / query token x_t : highlighted -->
  <circle cx="487" cy="153" r="29" fill="#c4a7e7" stroke="#8f6fbf" stroke-width="4"/>
  <text x="487" y="160" text-anchor="middle" font-size="18" font-weight="700" fill="#3a2a63">x<tspan dy="5" font-size="12">t</tspan></text>
  <text x="487" y="205" text-anchor="middle" font-size="15" font-weight="600" fill="#9b9b9b">latest</text>

  <!-- arrow context -> GPT -->
  <path d="M550 153 H 622" fill="none" stroke="#404040" stroke-width="4"/>
  <polygon points="640,153 622,145 622,161" fill="#404040"/>

  <!-- ================= Causal GPT-RL (center) ================= -->
  <rect x="620" y="108" width="230" height="90" rx="20" fill="#404040"/>
  <text x="735" y="152" text-anchor="middle" font-size="26" font-weight="700" fill="#ffffff">Causal GPT-RL</text>
  <text x="735" y="181" text-anchor="middle" font-size="15" fill="#c9c9c9">model θ · context x_{≤t}</text>

  <!-- arrow GPT -> output -->
  <path d="M830 153 H 952" fill="none" stroke="#404040" stroke-width="4"/>
  <polygon points="970,153 952,145 952,161" fill="#404040"/>

  <!-- ================= OUTPUT (right, heads at position t) ================= -->
  <text x="1218" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#c98a2e">Output</text>
  <text x="1218" y="74" text-anchor="middle" font-size="15" font-weight="600" fill="#404040">output token → (aₜ₊₁, Vₜ₊₁, eosₜ)</text>

  <!-- output token grouping card (mirrors the at-token panel) -->
  <rect x="1018" y="84" width="400" height="306" rx="14" fill="#fdf6ec" stroke="#f0dcc0" stroke-width="2"/>

  <g transform="translate(0,16)">
  <!-- pi_{t+1} -->
  <circle cx="1075" cy="120" r="32" fill="#f6c68a"/>
  <text x="1075" y="127" text-anchor="middle" font-size="24" font-style="italic" fill="#2b2b2b">a<tspan dy="6" font-size="12">t+1</tspan></text>
  <!-- V_{t+1} (minimal RL signal) -->
  <circle cx="1075" cy="200" r="32" fill="#f6c68a"/>
  <text x="1075" y="207" text-anchor="middle" font-size="24" font-style="italic" fill="#2b2b2b">V<tspan dy="6" font-size="12">t+1</tspan></text>
  <!-- eos_t (termination / EOS) -->
  <circle cx="1075" cy="280" r="32" fill="#f6c68a" stroke="#e0a860" stroke-width="3" stroke-dasharray="6 6"/>
  <text x="1075" y="286" text-anchor="middle" font-size="18" font-weight="700" fill="#2b2b2b">eos<tspan dy="6" font-size="11">t</tspan></text>

  <text x="1120" y="125" text-anchor="start" font-size="15" fill="#404040">action at t+1</text>
  <text x="1120" y="205" text-anchor="start" font-size="15" fill="#404040">state value at t+1</text>
  <text x="1120" y="285" text-anchor="start" font-size="15" fill="#404040">episode-end probability</text>

  <!-- alignment note -->
  <text x="1120" y="330" text-anchor="start" font-size="13" fill="#9b6fbf">outputs: next action &amp; value aligned to (t+1)</text>
  <text x="1120" y="350" text-anchor="start" font-size="13" fill="#9b6fbf">termination: done label of transition (t)</text>
  </g>

  <!-- color key (centered vertically with the at-token panel) -->
  <text x="680" y="353" text-anchor="start" font-size="16" font-weight="700" fill="#404040">Color key</text>
  <rect x="680" y="365" width="22" height="22" rx="6" fill="#f2ebfa" stroke="#c4a7e7" stroke-width="2"/>
  <text x="712" y="381" text-anchor="start" font-size="14" fill="#404040">Input side</text>
  <rect x="680" y="395" width="22" height="22" rx="6" fill="#fdf1e0" stroke="#f6c68a" stroke-width="2"/>
  <text x="712" y="411" text-anchor="start" font-size="14" fill="#404040">Output side</text>
  <rect x="680" y="425" width="22" height="22" rx="6" fill="url(#spaceActionFill)" stroke="url(#spaceActionStroke)" stroke-width="2"/>
  <text x="712" y="441" text-anchor="start" font-size="14" fill="#404040">Action — feeds both sides</text>

  <!-- ================= TOKEN EXPANSION (bottom-left panel) ================= -->
  <rect x="80" y="300" width="560" height="180" rx="14" fill="#f7f4fb" stroke="#e2d6f0" stroke-width="2"/>
  <text x="104" y="334" text-anchor="start" font-size="18" font-weight="700" fill="#6b4f9e">
    at token   xₜ = [ sₜ , aₜ , bosₜ ]
  </text>

  <circle cx="185" cy="400" r="32" fill="#c4a7e7"/>
  <text x="185" y="407" text-anchor="middle" font-size="24" font-style="italic" fill="#2b2b2b">s<tspan dy="6" font-size="12">t</tspan></text>
  <circle cx="340" cy="400" r="32" fill="#c4a7e7"/>
  <text x="340" y="407" text-anchor="middle" font-size="24" font-style="italic" fill="#2b2b2b">a<tspan dy="6" font-size="12">t</tspan></text>
  <circle cx="500" cy="400" r="34" fill="#c4a7e7"/>
  <text x="500" y="405" text-anchor="middle" font-size="18" font-weight="700" fill="#2b2b2b">bos<tspan dy="6" font-size="11">t</tspan></text>

  <text x="185" y="455" text-anchor="middle" font-size="14" fill="#404040">state at t</text>
  <text x="340" y="455" text-anchor="middle" font-size="14" fill="#404040">action at t</text>
  <text x="500" y="455" text-anchor="middle" font-size="14" fill="#404040">episode-start flag</text>

  <!-- curved connector: latest token x_t  ->  expansion panel (bows right to clear the labels) -->
  <path d="M508 176 C 606 206, 560 250, 560 300" fill="none" stroke="#8f6fbf" stroke-width="2.5"/>
  <polygon points="560,308 552,292 568,292" fill="#8f6fbf"/>
  <text x="595" y="250" text-anchor="start" font-size="16" font-style="italic" font-weight="600" fill="#8f6fbf">expand</text>

  <!-- ================= DYNAMIC I/O SCHEMA CONSTRUCTION (bottom band) ================= -->
  <line x1="40" y1="512" x2="1420" y2="512" stroke="#e2d6f0" stroke-width="2"/>
  <text x="730" y="562" text-anchor="middle" font-size="36" font-weight="700" fill="#6b4f9e">I/O schema construction</text>
  <text x="730" y="596" text-anchor="middle" font-size="16" fill="#404040">Minari offline dataset spaces → DataSpec schema → Model I/O heads at build-time</text>

  <!-- Your Dataset (Minari) -> defines the spaces -->
  <rect x="60" y="749" width="180" height="64" rx="14" fill="#f0f0f2" stroke="#b8b8be" stroke-width="2"/>
  <text x="150" y="777" text-anchor="middle" font-size="16" font-weight="700" fill="#404040">Your Dataset</text>
  <text x="150" y="799" text-anchor="middle" font-size="12" fill="#8a8a8a">Minari offline</text>

  <path d="M240 781 H275 V740 H308" fill="none" stroke="#6b6b6b" stroke-width="3"/>
  <polygon points="310,740 301,735 301,745" fill="#404040"/>
  <path d="M240 781 H275 V822 H308" fill="none" stroke="#6b6b6b" stroke-width="3"/>
  <polygon points="310,822 301,817 301,827" fill="#404040"/>

  <!-- Minari offline dataset spaces (left) -->
  <rect x="310" y="708" width="220" height="64" rx="14" fill="#f7f4fb" stroke="#c4a7e7" stroke-width="2"/>
  <text x="420" y="736" text-anchor="middle" font-size="16" font-weight="700" fill="#6b4f9e">Observation Space</text>
  <text x="420" y="758" text-anchor="middle" font-size="12" fill="#8a8a8a">Box · Discrete · Dict …</text>

  <rect x="310" y="790" width="220" height="64" rx="14" fill="url(#spaceActionFill)" stroke="url(#spaceActionStroke)" stroke-width="2"/>
  <text x="420" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#9a6a1e">Action Space</text>
  <text x="420" y="840" text-anchor="middle" font-size="11" fill="#8a8a8a">Box · Discrete · MultiDiscrete · MultiBinary …</text>

  <!-- spaces -> schema (100px gap) -->
  <path d="M530 740 H580 V765 H628" fill="none" stroke="#6b6b6b" stroke-width="3"/>
  <polygon points="630,765 621,760 621,770" fill="#404040"/>
  <path d="M530 822 H580 V799 H628" fill="none" stroke="#6b6b6b" stroke-width="3"/>
  <polygon points="630,799 621,794 621,804" fill="#404040"/>

  <!-- schema box (centered at x=730) -->
  <rect x="630" y="738" width="200" height="88" rx="18" fill="#404040"/>
  <text x="730" y="778" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">schema</text>
  <text x="730" y="802" text-anchor="middle" font-size="12" fill="#c9c9c9">Gym SpaceSpec → DataSpec</text>

  <!-- schema -> heads (100px gap) -->
  <path d="M830 770 H880 V693 H948" fill="none" stroke="#8f6fbf" stroke-width="3"/>
  <polygon points="950,693 941,688 941,698" fill="#8f6fbf"/>
  <path d="M830 794 H880 V819 H948" fill="none" stroke="#c98a2e" stroke-width="3"/>
  <polygon points="950,819 941,814 941,824" fill="#c98a2e"/>

  <!-- input heads (input side = purple) -->
  <rect x="950" y="657" width="240" height="72" rx="16" fill="#f2ebfa" stroke="#c4a7e7" stroke-width="2"/>
  <text x="1070" y="680" text-anchor="middle" font-size="16" font-weight="700" fill="#6b4f9e">Input spec</text>
  <text x="1070" y="708" text-anchor="middle" font-size="12" fill="#8a8a8a">state · action · bos</text>

  <!-- output heads -->
  <rect x="950" y="783" width="240" height="72" rx="16" fill="#fdf1e0" stroke="#f6c68a" stroke-width="2"/>
  <text x="1070" y="806" text-anchor="middle" font-size="16" font-weight="700" fill="#9a6a1e">Output spec</text>
  <text x="1070" y="834" text-anchor="middle" font-size="12" fill="#8a8a8a">next action · value · termination</text>

  <!-- Input/Output spec -> Model (closes the build-time story) -->
  <path d="M1190 693 H1245 V735 H1288" fill="none" stroke="#8f6fbf" stroke-width="3"/>
  <polygon points="1290,735 1281,730 1281,740" fill="#8f6fbf"/>
  <path d="M1190 819 H1245 V777 H1288" fill="none" stroke="#c98a2e" stroke-width="3"/>
  <polygon points="1290,777 1281,772 1281,782" fill="#c98a2e"/>

  <rect x="1290" y="711" width="140" height="90" rx="18" fill="#404040"/>
  <text x="1360" y="750" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Model</text>
  <text x="1360" y="772" text-anchor="middle" font-size="12" fill="#c9c9c9">Causal GPT-RL θ</text>
  </g>
</svg>
